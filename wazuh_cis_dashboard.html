<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wazuh Agent CIS Skorları Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-weight: 600;
            color: #495057;
            font-size: 0.9em;
        }

        .form-group input, .form-group select {
            padding: 10px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            background: #f8f9fa;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border-left: 4px solid #667eea;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #6c757d;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .table-container {
            padding: 30px;
            overflow-x: auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .table th {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .table td {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            font-size: 14px;
        }

        .table tr:hover {
            background: #f8f9fa;
        }

        .status-active {
            background: #d4edda;
            color: #155724;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .status-disconnected {
            background: #f8d7da;
            color: #721c24;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .score-high {
            color: #28a745;
            font-weight: bold;
        }

        .score-medium {
            color: #ffc107;
            font-weight: bold;
        }

        .score-low {
            color: #dc3545;
            font-weight: bold;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 30px;
            border-left: 4px solid #dc3545;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 30px;
            border-left: 4px solid #28a745;
        }

        .export-buttons {
            padding: 20px 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
            
            .table-container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔒 Wazuh Agent CIS Skorları</h1>
            <p>Center for Internet Security Uyumluluk Raporu</p>
        </div>

        <div class="controls">
            <div class="form-group">
                <label for="wazuhUrl">Wazuh Manager URL</label>
                <input type="url" id="wazuhUrl" value="https://localhost" placeholder="https://wazuh.example.com">
            </div>
            
            <div class="form-group">
                <label for="username">Kullanıcı Adı</label>
                <input type="text" id="username" placeholder="admin">
            </div>
            
            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" placeholder="Şifrenizi girin">
            </div>
            
            <div class="form-group">
                <label for="apiToken">API Token (Opsiyonel)</label>
                <input type="text" id="apiToken" placeholder="API token kullanmak için">
            </div>
            
            <div class="form-group">
                <label>&nbsp;</label>
                <button class="btn btn-primary" onclick="loadCISScores()">📊 Verileri Yükle</button>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Wazuh'tan CIS skorları alınıyor...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>
        <div id="success" class="success" style="display: none;"></div>

        <div id="stats" class="stats" style="display: none;"></div>

        <div id="exportButtons" class="export-buttons" style="display: none;">
            <button class="btn btn-secondary" onclick="exportToCSV()">📄 CSV İndir</button>
            <button class="btn btn-secondary" onclick="exportToJSON()">📋 JSON İndir</button>
            <button class="btn btn-secondary" onclick="printReport()">🖨️ Yazdır</button>
        </div>

        <div id="tableContainer" class="table-container" style="display: none;">
            <table class="table" id="cisTable">
                <thead>
                    <tr>
                        <th>Agent ID</th>
                        <th>Agent Adı</th>
                        <th>Durum</th>
                        <th>Toplam Kontrol</th>
                        <th>Geçen</th>
                        <th>Başarısız</th>
                        <th>Hata</th>
                        <th>Bilinmeyen</th>
                        <th>Uyumluluk Skoru</th>
                        <th>Son Tarama</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let cisData = [];

        async function loadCISScores() {
            const url = document.getElementById('wazuhUrl').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const apiToken = document.getElementById('apiToken').value;

            if (!apiToken && (!username || !password)) {
                showError('Lütfen kullanıcı adı/şifre veya API token girin.');
                return;
            }

            showLoading();
            hideError();
            hideSuccess();

            try {
                // Token alma
                let token;
                if (apiToken) {
                    token = apiToken;
                } else {
                    const authResponse = await fetch(`${url}/api/auth`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            user: username,
                            password: password
                        })
                    });

                    if (!authResponse.ok) {
                        throw new Error('Kimlik doğrulama başarısız');
                    }

                    const authData = await authResponse.json();
                    token = authData.data.token;
                }

                // Agentları al
                const agentsResponse = await fetch(`${url}/api/agents`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!agentsResponse.ok) {
                    throw new Error('Agent listesi alınamadı');
                }

                const agentsData = await agentsResponse.json();
                const agents = agentsData.data.affected_items;

                if (agents.length === 0) {
                    showSuccess('Hiç agent bulunamadı.');
                    hideLoading();
                    return;
                }

                // Her agent için CIS verilerini al
                const results = [];
                for (let i = 0; i < agents.length; i++) {
                    const agent = agents[i];
                    updateLoadingMessage(`İşleniyor: ${i + 1}/${agents.length} - ${agent.name || `Agent-${agent.id}`}`);

                    try {
                        const cisResponse = await fetch(`${url}/api/agents/${agent.id}/compliance/cis`, {
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });

                        let cisScores = {
                            total_checks: 0,
                            passed: 0,
                            failed: 0,
                            error: 0,
                            unknown: 0,
                            compliance_score: 0,
                            last_scan: 'N/A'
                        };

                        if (cisResponse.ok) {
                            const cisData = await cisResponse.json();
                            if (cisData.data.affected_items.length > 0) {
                                cisScores = parseCISData(cisData.data.affected_items);
                            }
                        }

                        results.push({
                            'Agent ID': agent.id,
                            'Agent Name': agent.name || `Agent-${agent.id}`,
                            'Status': agent.status || 'unknown',
                            'Total Checks': cisScores.total_checks,
                            'Passed': cisScores.passed,
                            'Failed': cisScores.failed,
                            'Error': cisScores.error,
                            'Unknown': cisScores.unknown,
                            'Compliance Score (%)': Math.round(cisScores.compliance_score * 100) / 100,
                            'Last Scan': cisScores.last_scan
                        });
                    } catch (error) {
                        console.error(`Agent ${agent.id} için hata:`, error);
                        results.push({
                            'Agent ID': agent.id,
                            'Agent Name': agent.name || `Agent-${agent.id}`,
                            'Status': agent.status || 'unknown',
                            'Total Checks': 0,
                            'Passed': 0,
                            'Failed': 0,
                            'Error': 0,
                            'Unknown': 0,
                            'Compliance Score (%)': 0,
                            'Last Scan': 'N/A'
                        });
                    }
                }

                cisData = results;
                displayResults(results);
                showSuccess(`${results.length} agent için CIS skorları başarıyla alındı.`);

            } catch (error) {
                showError(`Hata: ${error.message}`);
            } finally {
                hideLoading();
            }
        }

        function parseCISData(cisItems) {
            let scores = {
                total_checks: 0,
                passed: 0,
                failed: 0,
                error: 0,
                unknown: 0,
                compliance_score: 0,
                last_scan: 'N/A'
            };

            for (const item of cisItems) {
                if (item.compliance) {
                    const compliance = item.compliance;
                    scores.total_checks += compliance.total_checks || 0;
                    scores.passed += compliance.passed || 0;
                    scores.failed += compliance.failed || 0;
                    scores.error += compliance.error || 0;
                    scores.unknown += compliance.unknown || 0;

                    if (compliance.last_scan) {
                        scores.last_scan = compliance.last_scan;
                    }
                }
            }

            if (scores.total_checks > 0) {
                scores.compliance_score = (scores.passed / scores.total_checks) * 100;
            }

            return scores;
        }

        function displayResults(data) {
            // İstatistikleri göster
            displayStats(data);

            // Tabloyu göster
            displayTable(data);

            // Export butonlarını göster
            document.getElementById('exportButtons').style.display = 'flex';
        }

        function displayStats(data) {
            const totalAgents = data.length;
            const agentsWithCIS = data.filter(d => d['Total Checks'] > 0).length;
            const avgCompliance = data.reduce((sum, d) => sum + d['Compliance Score (%)'], 0) / totalAgents;
            
            const highCompliance = data.filter(d => d['Compliance Score (%)'] >= 80).length;
            const mediumCompliance = data.filter(d => d['Compliance Score (%)'] >= 60 && d['Compliance Score (%)'] < 80).length;
            const lowCompliance = data.filter(d => d['Compliance Score (%)'] < 60).length;

            const statsHtml = `
                <div class="stat-card">
                    <div class="stat-number">${totalAgents}</div>
                    <div class="stat-label">Toplam Agent</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${agentsWithCIS}</div>
                    <div class="stat-label">CIS Verisi Olan</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${avgCompliance.toFixed(1)}%</div>
                    <div class="stat-label">Ortalama Uyumluluk</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${highCompliance}</div>
                    <div class="stat-label">Yüksek Uyumluluk (≥80%)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${mediumCompliance}</div>
                    <div class="stat-label">Orta Uyumluluk (60-79%)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${lowCompliance}</div>
                    <div class="stat-label">Düşük Uyumluluk (<60%)</div>
                </div>
            `;

            document.getElementById('stats').innerHTML = statsHtml;
            document.getElementById('stats').style.display = 'grid';
        }

        function displayTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.forEach(row => {
                const tr = document.createElement('tr');
                
                const statusClass = row['Status'] === 'active' ? 'status-active' : 'status-disconnected';
                const scoreClass = getScoreClass(row['Compliance Score (%)']);

                tr.innerHTML = `
                    <td>${row['Agent ID']}</td>
                    <td>${row['Agent Name']}</td>
                    <td><span class="${statusClass}">${row['Status']}</span></td>
                    <td>${row['Total Checks']}</td>
                    <td>${row['Passed']}</td>
                    <td>${row['Failed']}</td>
                    <td>${row['Error']}</td>
                    <td>${row['Unknown']}</td>
                    <td class="${scoreClass}">${row['Compliance Score (%)']}%</td>
                    <td>${row['Last Scan']}</td>
                `;

                tbody.appendChild(tr);
            });

            document.getElementById('tableContainer').style.display = 'block';
        }

        function getScoreClass(score) {
            if (score >= 80) return 'score-high';
            if (score >= 60) return 'score-medium';
            return 'score-low';
        }

        function exportToCSV() {
            if (cisData.length === 0) return;

            const headers = Object.keys(cisData[0]);
            const csvContent = [
                headers.join(','),
                ...cisData.map(row => headers.map(header => `"${row[header]}"`).join(','))
            ].join('\n');

            downloadFile(csvContent, 'wazuh_cis_scores.csv', 'text/csv');
        }

        function exportToJSON() {
            if (cisData.length === 0) return;

            const jsonContent = JSON.stringify(cisData, null, 2);
            downloadFile(jsonContent, 'wazuh_cis_scores.json', 'application/json');
        }

        function printReport() {
            window.print();
        }

        function downloadFile(content, filename, contentType) {
            const blob = new Blob([content], { type: contentType });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function updateLoadingMessage(message) {
            const loadingElement = document.getElementById('loading');
            const messageElement = loadingElement.querySelector('p');
            messageElement.textContent = message;
        }

        function showError(message) {
            const errorElement = document.getElementById('error');
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        function showSuccess(message) {
            const successElement = document.getElementById('success');
            successElement.textContent = message;
            successElement.style.display = 'block';
        }

        function hideSuccess() {
            document.getElementById('success').style.display = 'none';
        }

        // Enter tuşu ile form gönderimi
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loadCISScores();
            }
        });
    </script>
</body>
</html>
